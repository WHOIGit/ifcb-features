name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install package and test dependencies
      run: pip install -e ".[test]"

    - name: Run tests
      run: pytest -v
